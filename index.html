<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<title>Yachay — Quechua & Aymara</title>
<link href="https://fonts.googleapis.com/css2?family=Lora:ital,wght@0,700;1,400&family=DM+Sans:wght@400;500;700&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{--bg:#07090f;--card:#0f1520;--card2:#141c2b;--bdr:#1e2a3d;--txt:#e8eef7;--muted:#a8bbd4;--gold:#e8a020;--teal:#2dd4bf;--rose:#fb7185;--violet:#818cf8;--amber:#fbbf24;--green:#34d399;--qcolor:#f0e8d0;--aycolor:#c8f0e8}
html,body{width:100%;min-height:100%;background:var(--bg);color:var(--txt);font-family:"DM Sans",sans-serif}
.scr{display:none;min-height:100vh;flex-direction:column;background:var(--bg)}
.scr.on{display:flex}
.fscr{display:none;height:100vh;flex-direction:column;overflow:hidden;background:var(--bg)}
.fscr.on{display:flex}
.mscr{display:none;min-height:100vh;flex-direction:column;position:relative;overflow:hidden}
.mscr.on{display:flex}
/* LANG TABS */
.ltabs{display:flex;background:#0a0e18;border-bottom:2px solid var(--bdr);position:sticky;top:0;z-index:30}
.ltab{flex:1;padding:13px 8px;font-size:14px;font-weight:700;cursor:pointer;text-align:center;border:none;background:none;color:var(--muted);border-bottom:3px solid transparent;margin-bottom:-2px;-webkit-tap-highlight-color:transparent;letter-spacing:.5px}
.ltab.on{color:var(--gold);border-bottom-color:var(--gold)}
.ltab.ay.on{color:var(--teal);border-bottom-color:var(--teal)}
/* MORNING */
.mbg{position:absolute;inset:0;background:linear-gradient(160deg,#0a1628,#071020 40%,#0d0810)}
.mbg::before{content:"";position:absolute;inset:0;background:radial-gradient(ellipse at 50% 20%,rgba(232,160,32,.18),transparent 60%)}
.mc{position:relative;z-index:1;flex:1;display:flex;flex-direction:column;padding:54px 22px 28px}
.mdate{font-size:11px;font-weight:700;letter-spacing:3px;text-transform:uppercase;color:var(--gold);margin-bottom:5px;opacity:.8}
.mgreet{font-size:13px;color:rgba(232,238,247,.5);margin-bottom:26px}
.msun{font-size:48px;text-align:center;margin-bottom:16px;animation:sup 1.5s ease forwards}
@keyframes sup{from{opacity:0;transform:translateY(16px)}to{opacity:1;transform:translateY(0)}}
.mbox{background:rgba(255,255,255,.04);border:1px solid rgba(255,255,255,.09);border-radius:20px;padding:22px 20px;margin-bottom:14px;animation:fup .8s ease .3s both}
@keyframes fup{from{opacity:0;transform:translateY(12px)}to{opacity:1;transform:translateY(0)}}
.mq{font-family:"Lora",serif;font-size:17px;font-weight:700;line-height:1.65;color:var(--qcolor);border-left:3px solid var(--gold);padding-left:13px;margin-bottom:10px}
.ms{font-size:13px;color:var(--muted);line-height:1.65;font-style:italic;padding-left:16px}
.mword{background:rgba(232,160,32,.07);border:1px solid rgba(232,160,32,.2);border-radius:13px;padding:14px 16px;margin-bottom:16px;animation:fup .8s ease .5s both}
.mwl{font-size:10px;font-weight:700;letter-spacing:2px;text-transform:uppercase;color:var(--gold);margin-bottom:6px}
.mwq{font-family:"Lora",serif;font-size:20px;font-weight:700;margin-bottom:3px}
.mws{font-size:13px;color:var(--muted);font-style:italic}
.melems{display:flex;gap:8px;margin-bottom:20px;animation:fup .8s ease .7s both}
.me{flex:1;background:rgba(255,255,255,.04);border:1px solid rgba(255,255,255,.07);border-radius:11px;padding:10px 5px;text-align:center}
.me-e{font-size:19px;display:block;margin-bottom:3px}
.me-q{font-size:11px;font-weight:700}
.me-s{font-size:10px;color:var(--muted)}
.mbtn{width:100%;padding:15px;border-radius:14px;border:none;background:linear-gradient(135deg,var(--gold),#ffd166);color:#000;font-size:15px;font-weight:700;cursor:pointer;animation:fup .8s ease .9s both;-webkit-tap-highlight-color:transparent}
/* HOME */
.ahdr{background:linear-gradient(170deg,#0d1f3c,#080c14 65%);padding:44px 22px 22px;text-align:center;border-bottom:1px solid var(--bdr);position:relative;overflow:hidden}
.ahdr::after{content:"";position:absolute;inset:0;background:radial-gradient(ellipse at 50% -20%,rgba(232,160,32,.12),transparent 65%)}
.atit{font-family:"Lora",serif;font-size:27px;font-weight:700;color:#fff;margin-bottom:4px;position:relative}
.asub{color:var(--muted);font-size:13px;position:relative}
.hbody{padding:16px 15px 50px;flex:1}
.slbl{font-size:10px;letter-spacing:3px;text-transform:uppercase;color:var(--muted);margin-bottom:10px;font-weight:700}
.mc2{width:100%;display:flex;align-items:flex-start;gap:12px;background:var(--card);border:1px solid var(--bdr);border-radius:14px;padding:15px;margin-bottom:10px;cursor:pointer;text-align:left;-webkit-tap-highlight-color:transparent}
.mc2:active{opacity:.8}
.mi{font-size:24px;flex-shrink:0;margin-top:1px}
.mn{flex:1}
.mn-t{font-size:15px;font-weight:700;margin-bottom:2px;color:var(--txt)}
.mn-d{font-size:12px;color:var(--muted);line-height:1.5}
/* TOPBAR */
.tb{display:flex;align-items:center;justify-content:space-between;padding:12px 15px;border-bottom:1px solid var(--bdr);background:var(--bg);position:sticky;top:0;z-index:20}
.bk{background:none;border:none;color:var(--muted);font-size:22px;cursor:pointer;padding:4px 8px;-webkit-tap-highlight-color:transparent}
.tbt{font-size:14px;font-weight:600}
.pbar{height:3px;background:var(--bdr)}
.pfill{height:100%;transition:width .4s}
.cb{padding:19px 15px 60px;flex:1;overflow-y:auto;background:var(--bg)}
/* READER */
.ptyp{display:inline-block;padding:4px 11px;border-radius:10px;font-size:11px;font-weight:700;letter-spacing:1.5px;text-transform:uppercase;margin-bottom:8px}
.ptit{font-family:"Lora",serif;font-size:21px;font-weight:700;line-height:1.3;margin-bottom:4px}
.psub{font-size:13px;color:var(--muted);font-style:italic;margin-bottom:18px}
.togrow{display:flex;gap:6px;margin-bottom:18px}
.togbtn{flex:1;padding:8px 4px;border-radius:9px;border:1px solid var(--bdr);background:transparent;font-size:12px;font-weight:600;cursor:pointer;color:var(--muted);-webkit-tap-highlight-color:transparent}
.ql{font-family:"Lora",serif;font-size:17px;font-weight:700;line-height:1.6;color:var(--qcolor);margin-bottom:5px}
.ql.ay{color:var(--aycolor)}
.sl{font-size:14px;color:var(--muted);line-height:1.6;font-style:italic;padding-left:12px;border-left:2px solid var(--bdr);margin-bottom:14px}
.parallel .sl{display:block}
.qonly .sl{display:none}
.sonly .ql{display:none}
.sonly .sl{border:none;padding:0;font-style:normal;color:var(--txt);font-size:16px}
.poem .ql{font-style:italic;text-align:center;color:var(--qcolor)}
.poem .sl{text-align:center;border:none;padding:0}
.eqp{font-family:"Lora",serif;font-size:16px;font-weight:700;line-height:1.75;color:var(--qcolor);margin-bottom:7px}
.esp{font-size:13px;color:var(--muted);line-height:1.7;padding:10px 13px;background:var(--card2);border-radius:9px;border-left:3px solid var(--teal);margin-bottom:16px}
.gbox{background:var(--card2);border:1px solid var(--bdr);border-left:3px solid var(--violet);border-radius:12px;padding:14px;margin-top:18px}
.gtit{font-size:10px;font-weight:700;letter-spacing:2px;text-transform:uppercase;color:var(--violet);margin-bottom:9px}
.gterm{font-size:13px;font-weight:700;color:var(--amber);margin-bottom:2px}
.gdef{font-size:12px;color:var(--muted);line-height:1.5;margin-bottom:7px}
.pnav{display:flex;gap:8px;margin-top:22px}
.pnav button{flex:1;padding:13px;border-radius:11px;border:none;font-size:14px;font-weight:700;cursor:pointer;-webkit-tap-highlight-color:transparent}
.nbtn{background:var(--card);border:1px solid var(--bdr);border-radius:8px;padding:6px 11px;color:var(--txt);font-size:13px;cursor:pointer}
.nbtn:disabled{opacity:.3}
/* REF */
.rtabs{display:flex;border-bottom:1px solid var(--bdr);background:var(--bg);position:sticky;top:49px;z-index:15}
.rtab{flex:1;padding:11px 8px;font-size:12px;font-weight:700;cursor:pointer;text-align:center;border:none;background:none;color:var(--muted);border-bottom:2px solid transparent;-webkit-tap-highlight-color:transparent}
.rtab.on{color:var(--gold);border-bottom-color:var(--gold)}
.rsearch{padding:10px 14px;border-bottom:1px solid var(--bdr);background:var(--card)}
.rsearch input{width:100%;background:var(--card2);border:1px solid var(--bdr);border-radius:9px;padding:9px 12px;color:var(--txt);font-size:14px;font-family:"DM Sans",sans-serif;outline:none}
.rsearch input::placeholder{color:var(--muted)}
.rcath{font-size:10px;font-weight:700;letter-spacing:2.5px;text-transform:uppercase;color:var(--muted);padding:12px 15px 7px;background:var(--bg)}
.ritem{display:flex;align-items:center;padding:12px 15px;border-bottom:1px solid var(--bdr);cursor:pointer;-webkit-tap-highlight-color:transparent}
.ritem:active{background:var(--card)}
.riq{font-family:"Lora",serif;font-size:17px;font-weight:700;color:var(--txt);margin-bottom:3px}
.ris{font-size:13px;color:var(--muted)}
.rtag{font-size:10px;font-weight:700;letter-spacing:1px;padding:3px 8px;border-radius:6px;flex-shrink:0;text-transform:uppercase}
.dpanel{position:fixed;inset:0;background:var(--bg);z-index:100;display:none;flex-direction:column;overflow-y:auto}
.dpanel.on{display:flex}
.dclose{position:fixed;top:12px;left:12px;background:var(--card);border:1px solid var(--bdr);border-radius:10px;color:var(--txt);font-size:15px;cursor:pointer;padding:7px 12px;z-index:101}
.dhdr{padding:58px 18px 18px;border-bottom:1px solid var(--bdr)}
.dword{font-family:"Lora",serif;font-size:28px;font-weight:700;margin-bottom:4px}
.dmean{font-size:15px;color:var(--muted);font-style:italic;margin-bottom:6px}
.dbody{padding:18px}
.dsect{margin-bottom:20px}
.dstit{font-size:10px;font-weight:700;letter-spacing:2px;text-transform:uppercase;color:var(--muted);margin-bottom:8px}
.ctable{width:100%;border-collapse:collapse}
.ctable td{padding:9px 11px;border-bottom:1px solid var(--bdr);font-size:14px}
.ctable td:first-child{color:var(--muted);font-size:12px;width:45%}
.ctable td:last-child{font-family:"Lora",serif;font-weight:600;color:var(--amber)}
.exbox{background:var(--card2);border-radius:9px;padding:11px 13px;margin-bottom:8px}
.exq{font-family:"Lora",serif;font-size:15px;font-weight:600;margin-bottom:3px}
.exs{font-size:13px;color:var(--muted);font-style:italic}
.notebox{background:var(--card2);border-radius:9px;padding:11px 13px;font-size:13px;color:var(--muted);line-height:1.6}
/* CARDS */
.ctbar{display:flex;align-items:center;justify-content:space-between;padding:12px 15px;border-bottom:1px solid var(--bdr);background:var(--bg);flex-shrink:0}
.ccnt{font-size:12px;font-weight:700;color:var(--gold);background:rgba(232,160,32,.1);border:1px solid rgba(232,160,32,.25);padding:4px 11px;border-radius:20px}
.fbtn{background:var(--bdr);border:none;border-radius:9px;padding:7px 11px;font-size:12px;font-weight:700;color:var(--txt);cursor:pointer;-webkit-tap-highlight-color:transparent}
.cstage{flex:1;display:flex;align-items:center;justify-content:center;perspective:1200px;position:relative;padding:10px}
.cwrap{position:relative;width:100%;max-width:360px;height:100%}
.ghost{position:absolute;border-radius:20px;background:var(--card);pointer-events:none}
.g2{width:calc(100% - 18px);left:9px;height:calc(100% - 14px);top:9px;opacity:.3;transform:scale(.95)}
.g1{width:calc(100% - 9px);left:4px;height:calc(100% - 7px);top:5px;opacity:.18;transform:scale(.97)}
.fc{position:absolute;inset:0;cursor:pointer;transform-style:preserve-3d;transition:transform .5s cubic-bezier(.4,0,.2,1);-webkit-tap-highlight-color:transparent;user-select:none}
.fc.flip{transform:rotateY(180deg)}
.cface{position:absolute;inset:0;border-radius:20px;backface-visibility:hidden;-webkit-backface-visibility:hidden;overflow:hidden}
.cfront{background:linear-gradient(145deg,#0e1a2e,#0a1020);border:1px solid #1d2d4a;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:26px 20px;text-align:center}
.ccatpos{position:absolute;top:16px;display:flex;justify-content:center;width:100%}
.ccpill{padding:4px 12px;border-radius:20px;font-size:10px;font-weight:700;letter-spacing:1.5px;text-transform:uppercase}
.cvb{font-family:"Lora",serif;font-size:38px;font-weight:700;line-height:1.1;margin-bottom:8px;background:linear-gradient(135deg,#f0a500,#ffd166);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
.cme{font-size:16px;color:rgba(240,244,255,.6);font-style:italic;font-family:"Lora",serif;margin-bottom:18px}
.ctap{position:absolute;bottom:15px;font-size:11px;color:var(--muted)}
.cback{background:linear-gradient(145deg,#091a12,#071210);border:1px solid #1a3528;transform:rotateY(180deg);padding:14px 14px 12px;display:flex;flex-direction:column;overflow-y:auto}
.cbv{font-family:"Lora",serif;font-size:18px;font-weight:700;color:var(--green);text-align:center;margin-bottom:2px}
.cbm{font-size:12px;color:var(--muted);font-style:italic;text-align:center;margin-bottom:10px}
.cgrid{display:grid;grid-template-columns:1fr 1fr 1fr;gap:5px;margin-bottom:9px}
.ccell{background:rgba(255,255,255,.04);border:1px solid rgba(255,255,255,.07);border-radius:8px;padding:7px 8px}
.cclbl{font-size:8px;color:var(--muted);font-weight:700;letter-spacing:.5px;text-transform:uppercase;margin-bottom:2px}
.ccword{font-family:"Lora",serif;font-size:12px;font-weight:700}
.cexlbl{font-size:9px;color:var(--muted);font-weight:700;letter-spacing:1px;text-transform:uppercase;margin-bottom:5px}
.cexi{background:rgba(240,165,0,.06);border:1px solid rgba(240,165,0,.15);border-radius:7px;padding:7px 9px;margin-bottom:5px}
.cexiq{font-family:"Lora",serif;font-size:13px;font-weight:600;color:var(--gold);margin-bottom:2px}
.cexis{font-size:11px;color:var(--muted);font-style:italic}
.cexsuf{font-size:10px;color:var(--muted);margin-top:4px;padding-top:4px;border-top:1px solid rgba(240,165,0,.15);letter-spacing:0.01em}
.cnote{background:rgba(129,140,248,.07);border:1px solid rgba(129,140,248,.15);border-radius:7px;padding:7px 9px;font-size:11px;color:rgba(240,244,255,.5);line-height:1.5}

.ctabs{display:flex;gap:4px;margin-bottom:8px}
.ctbtn{flex:1;background:rgba(255,255,255,.04);border:1px solid rgba(255,255,255,.1);border-radius:7px;padding:5px 4px;font-size:10px;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:.5px;cursor:pointer;transition:background .15s,color .15s}
.ctbtn.on{background:rgba(240,165,0,.15);border-color:rgba(240,165,0,.35);color:var(--gold)}.swr,.swl{position:absolute;top:50%;transform:translateY(-50%);font-size:12px;font-weight:700;opacity:0;transition:opacity .15s;pointer-events:none;padding:6px 11px;border-radius:9px}
.swr{right:8px;background:rgba(34,211,165,.15);color:var(--green);border:1px solid rgba(34,211,165,.3)}
.swl{left:8px;background:rgba(251,113,133,.15);color:var(--rose);border:1px solid rgba(251,113,133,.3)}
.cacts{display:flex;align-items:center;justify-content:space-between;padding:11px 18px 22px;flex-shrink:0;gap:11px}
.ab{display:flex;flex-direction:column;align-items:center;gap:4px;cursor:pointer;border:none;background:none;padding:0;-webkit-tap-highlight-color:transparent}
.ab:active{transform:scale(.9)}
.aci{width:52px;height:52px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:21px;border:2px solid}
.ask .aci{background:rgba(251,113,133,.1);border-color:rgba(251,113,133,.4)}
.ask span{font-size:11px;font-weight:600;color:var(--rose)}
.alr .aci{background:rgba(34,211,165,.1);border-color:rgba(34,211,165,.4)}
.alr span{font-size:11px;font-weight:600;color:var(--green)}
.afli{display:flex;flex-direction:column;align-items:center;background:var(--gold);border-radius:14px;padding:12px 16px;border:none;cursor:pointer;-webkit-tap-highlight-color:transparent}
.afli:active{opacity:.85}
.afli span{font-size:13px;font-weight:700;color:#000}
.cemp{flex:1;display:none;flex-direction:column;align-items:center;justify-content:center;padding:36px;text-align:center}
.cemp.on{display:flex}
.ceme{font-size:56px;margin-bottom:12px}
.cemt{font-family:"Lora",serif;font-size:22px;font-weight:700;margin-bottom:7px}
.cems{font-size:14px;color:var(--muted);line-height:1.6;margin-bottom:22px}
.rbtn{padding:13px 26px;border-radius:12px;border:none;background:var(--gold);color:#000;font-size:14px;font-weight:700;cursor:pointer}
.fpanel{position:fixed;inset:0;background:rgba(0,0,0,.7);z-index:80;display:none;align-items:flex-end}
.fpanel.on{display:flex}
.fsheet{width:100%;background:#0e1525;border-radius:22px 22px 0 0;padding:18px 18px 36px}
.ftit{font-size:14px;font-weight:700;margin-bottom:12px;text-align:center;color:var(--muted)}
.ftags{display:flex;flex-wrap:wrap;gap:8px;margin-bottom:15px}
.ftag{padding:7px 14px;border-radius:20px;border:1px solid var(--bdr);background:transparent;font-size:13px;font-weight:600;color:var(--muted);cursor:pointer;-webkit-tap-highlight-color:transparent}
.ftag.on{border-color:var(--gold);background:rgba(232,160,32,.1);color:var(--gold)}
.fapply{width:100%;padding:13px;border-radius:11px;border:none;background:var(--gold);color:#000;font-size:14px;font-weight:700;cursor:pointer}
.toast{position:fixed;top:70px;left:50%;transform:translateX(-50%) translateY(-12px);padding:8px 15px;border-radius:10px;font-size:13px;font-weight:700;opacity:0;transition:all .3s;z-index:200;white-space:nowrap}
.toast.on{opacity:1;transform:translateX(-50%) translateY(0)}
/* QUIZ */
.qcard{background:var(--card);border:1px solid var(--bdr);border-radius:14px;padding:17px 15px;margin-bottom:15px}
.qprompt{font-size:11px;color:var(--muted);margin-bottom:5px;font-weight:600;letter-spacing:.5px;text-transform:uppercase}
.qsent{font-family:"Lora",serif;font-size:18px;font-weight:600;line-height:1.5;margin-bottom:15px;color:var(--qcolor)}
.qopts{display:flex;flex-direction:column;gap:8px}
.qopt{padding:12px 14px;border-radius:10px;border:2px solid var(--bdr);background:var(--card2);cursor:pointer;font-size:13px;line-height:1.45;font-weight:500;text-align:left;-webkit-tap-highlight-color:transparent}
.qopt.sel{border-color:var(--gold);background:rgba(232,160,32,.07)}
.qopt.ok{border-color:var(--green)!important;background:rgba(52,211,153,.08)!important;color:var(--green)!important}
.qopt.bad{border-color:var(--rose)!important;background:rgba(251,113,133,.08)!important;color:var(--rose)!important}
.qopt.dim{opacity:.35;cursor:default}
.qexp{margin-top:11px;padding:11px 13px;background:rgba(52,211,153,.06);border:1px solid rgba(52,211,153,.2);border-radius:9px;font-size:13px;color:#6ee7b7;line-height:1.6;animation:fup .3s ease}
.sbar{display:flex;align-items:center;justify-content:space-between;padding:10px 12px;background:var(--card);border-radius:10px;border:1px solid var(--bdr);margin-bottom:15px;font-size:13px}
.bmain{width:100%;padding:14px;border-radius:11px;border:none;font-size:14px;font-weight:700;cursor:pointer;-webkit-tap-highlight-color:transparent}
.bmain:disabled{opacity:.4}
.bghost{width:100%;padding:13px;border-radius:11px;border:1px solid var(--bdr);background:transparent;color:var(--txt);font-size:13px;cursor:pointer;-webkit-tap-highlight-color:transparent}
/* RESULT */
.rwrap{padding:42px 20px;text-align:center;flex:1;display:flex;flex-direction:column;align-items:center}
.rstats{display:flex;background:var(--card);border:1px solid var(--bdr);border-radius:13px;overflow:hidden;width:100%;margin-bottom:24px}
.rs{flex:1;padding:16px 8px;text-align:center}
.rs+.rs{border-left:1px solid var(--bdr)}
.rn{font-family:"Lora",serif;font-size:30px;font-weight:700}
.rl{font-size:11px;color:var(--muted);margin-top:2px}
/* CHAT */
.cmsgs{flex:1;overflow-y:auto;padding:14px 13px 8px;display:flex;flex-direction:column;gap:11px}
.msg{max-width:88%;display:flex;flex-direction:column;gap:4px;animation:fup .25s ease}
.msg.u{align-self:flex-end;align-items:flex-end}
.msg.a{align-self:flex-start;align-items:flex-start}
.bbl{padding:11px 14px;border-radius:16px;font-size:14px;line-height:1.6}
.u .bbl{background:var(--gold);color:#000;border-bottom-right-radius:4px;font-weight:500}

.sbtn{width:42px;height:42px;border-radius:11px;border:none;background:var(--gold);color:#000;font-size:18px;cursor:pointer;flex-shrink:0;display:flex;align-items:center;justify-content:center;-webkit-tap-highlight-color:transparent}

  .cb{padding:14px 12px 80px}
  .tb{padding:10px 12px}
  .rtab{font-size:13px;padding:13px 6px}
  .rsearch input{font-size:16px}
  .ri{padding:14px 12px}
  .ri-q{font-size:16px}
  .cface{border-radius:18px}

<script>

let LANG = 'q'; // 'q'=quechua, 'a'=aymara

function setLang(l) {
  LANG = l;
  document.getElementById('htab-q').className = 'ltab' + (l==='q' ? ' on' : '');
  document.getElementById('htab-a').className = 'ltab ay' + (l==='a' ? ' on' : '');
  renderHomeBody();
}

// ============================================================
// MORNING DATA — 30 frases
// ============================================================
const MSGS=[
{sun:"\uD83C\uDF04",g:"Allin p'unchay",q:"Kay p'unchayqa sumaqmi. Intip k'anchayninwan, Pachamaman munakuyninwan kallpancharikunki.",s:"Este día es hermoso. Con la luz del sol y el amor de la Madre Tierra te fortaleces.",w:{q:"Kallpancháriy",s:"Fortalecerse / llenarse de energía"}},
{sun:"☀️",g:"Tutamanta sumaq",q:"Inti llaqsimun, kawsayta qowan. Yakuqa purín, allpata wiqchun.",s:"El sol sale y da vida. El agua fluye y nutre la tierra.",w:{q:"Llaqsimuy",s:"Salir / amanecer (el sol)"}},
{sun:"\uD83C\uDF05",g:"Paqarin allinmi",q:"Pachamama, sulpayki kay p'unchayrayku. Apukuna, sulpayki kallpayniykichikrayku.",s:"Madre Tierra, gracias por este día. Apus, gracias por vuestra fuerza.",w:{q:"Sulpayki",s:"Gracias de corazón"}},
{sun:"\uD83C\uDF1E",g:"Inti t'ikarin",q:"Kay sach'akuna hina wiñay. Kay yaku hina puririmuy. Sunqoykipi kusiyta hunt'achiy.",s:"Crece como estos árboles. Fluye como esta agua. Llena tu corazón de alegría.",w:{q:"Hunt'achiy",s:"Llenar / completar"}},
{sun:"\uD83C\uDF24️",g:"K'anchay pacha",q:"Wayra rimawan: Sinchim kaytayki. Yaku rimawan: Kawsaytam qoyki. Allpa rimawan: Sunqoykim kachkanki.",s:"El viento: eres fuerte. El agua: te doy vida. La tierra: eres mi corazón.",w:{q:"Sinchim kaytayki",s:"Eres fuerte / tienes fuerza"}},
{sun:"(",g:"Mana llakichu",q:"Mana llakichu kay p'unchaypi. Inti k'anchayninwan p'ampasqa kachun ima llakiypis.",s:"No hay tristeza en este día. Que cualquier pena quede cubierta con la luz del sol.",w:{q:"K'anchay",s:"Luz / brillo / resplandor"}},
{sun:"\uD83C\uDF3F",g:"Sach'ap kallpanwan",q:"Sach'a hina sayaykuy: siqiynin urayman, muqunpi urqumantataq. Kallpaniyuqmi kanki.",s:"Párate como el árbol: raíces abajo, frutos hacia la montaña. Tienes fuerza.",w:{q:"Siqiy",s:"Raíz de árbol o planta"}},
{sun:"\uD83D\uDCA7",g:"Yakup yachayninwan",q:"Yaku mana saykusqachu, tukuy rumikunata pasaspa. Qampis hina kaway: sinchi, allin, munakuyniyuq.",s:"El agua nunca se cansa pasando por las rocas. Tú también: fuerte, bueno, lleno de amor.",w:{q:"Mana saykusqa",s:"Incansable / que no se cansa"}},
{sun:"\uD83C\uDFD4️",g:"Apup samiyninwan",q:"Kay urqu patanmanta Apu qawamun, samiykit quwan. Intip k'anchaynin sunqoykipi tiyakun.",s:"Desde la cima el Apu te observa y da bendición. La luz del sol habita en tu corazón.",w:{q:"Sami",s:"Bendición / buena energía"}},
{sun:"\uD83C\uDF3A",g:"T'ika hina sisariy",q:"T'ika sapa p'unchay inti qawaqtin rikch'arimun. Qampis kay p'unchaypi sumaqta sisariy.",s:"La flor despierta cuando el sol la mira. Tú también florece hermosamente hoy.",w:{q:"Sisariy",s:"Florecer / abrirse como flor"}},
{sun:"\uD83C\uDF04",g:"Kawsay hunt'a",q:"Kay p'unchayqa qampaqmi. Kallpayniykiwan, munakuyniykiwan, yachayniykiwan puriy.",s:"Este día es para ti. Camina con tu fuerza, tu amor y tu sabiduría.",w:{q:"Sumaq Kawsay",s:"Buen Vivir / vida plena en armonía"}},
{sun:"☀️",g:"Inti tayta",q:"Inti taytay, kay p'unchaypi k'anchaywaykim. Allpamama, munakuywaykim.",s:"Padre Sol, ilumíname hoy. Madre Tierra, quiéreme.",w:{q:"K'anchaway",s:"Ilumíname / dame tu luz"}},
{sun:"\uD83C\uDF05",g:"Qonqaychu",q:"Qonqaychu: kawsayniyki sumaqmi. Qonqaychu: kallpaniyuqmi kanki. Qonqaychu: munakusqa kanki.",s:"No olvides: tu vida es hermosa. No olvides: tienes fuerza. No olvides: eres amado/a.",w:{q:"Munakusqa",s:"Amado/a / querido/a"}},
{sun:"(",g:"Wiñay kawsay",q:"Sach'akunaqa wiñanku mana qonqaspa allpata. Qampis Pachamamata yupaychaspa wiñariy.",s:"Los árboles crecen sin olvidar la tierra. Tú también, honrando a la Pachamama, crece.",w:{q:"Wiñariy",s:"Crece / sigue creciendo"}},
{sun:"\uD83D\uDCAB",g:"Ch'aska k'anchayninwan",q:"Ch'aska tutamantapi ñawpaqmi rikch'arimun. Qampis ñawpaqman qaway: sumaq p'unchay chayamun.",s:"La estrella de la mañana despierta primero. Mira hacia adelante: llega un buen día.",w:{q:"Ñawpaqman",s:"Hacia adelante / al frente"}},
{sun:"\uD83C\uDF0A",g:"Mayu hina",q:"Mayu rumita tarispapis mana sayarikunchu, muyurispa purín. Qampis kay p'unchaypi hinallataq.",s:"El río aunque encuentra la roca no se detiene. Tú también así en este día.",w:{q:"Muyuriy",s:"Rodear / dar vuelta"}},
{sun:"\uD83C\uDFD4️",g:"Urqup sampaynin",q:"Urquqa mana kuyurinchu wayrap phukumuptin. Qampis hinallataq: llakiy chayamuqtinpis sinchim kanki.",s:"La montaña no se mueve cuando el viento sopla. Tú también eres fuerte ante la tristeza.",w:{q:"Mana kuyurin",s:"No se mueve / permanece firme"}},
{sun:"☀️",g:"Munayniyuq p'unchay",q:"Munakuyqa inti hina: tukuyman k'anchan, tukuyman q'onin. Kay p'unchaypi munakuywan hunt'a kay.",s:"El amor es como el sol: ilumina y calienta a todos. Hoy llénate de amor.",w:{q:"Q'oniy",s:"Calentar / dar calor"}},
{sun:"\uD83C\uDF3A",g:"Kawsayta munay",q:"Kay p'unchaypi inti tiyasqanmanta, yakup puririsqanmanta, wayrap phukusqanmanta kusikuy.",s:"Alégrate por el sol, por el fluir del agua, por el soplar del viento.",w:{q:"Kusikuy",s:"Alegrarse / sentir gozo"}},
{sun:"\uD83C\uDF04",g:"Sami p'unchay",q:"Apukuna taytaykuna kanku, Pachamama mamayki. Paykuna samiykit quwan, qam munakuyniyuqta.",s:"Los Apus son tus padres, la Pachamama tu madre. Te dan bendición.",w:{q:"Taytaykuna",s:"Tus padres / tus mayores"}},
{sun:"(",g:"Allin sunqo",q:"Sunqo allinmi kaqtiy, tukuy ima allinmanmi purin. Allin sunqowan kay p'unchaypi puririmuy.",s:"Cuando el corazón está bien, todo va bien. Camina este día con buen corazón.",w:{q:"Allin sunqo",s:"Buen corazón / corazón en paz"}},
{sun:"\uD83C\uDF1E",g:"Sapa p'unchay Inti Raymi",q:"Sapa p'unchay Inti Raymim, sapa p'unchay t'ikay, sapa p'unchay kawsaypa musuqyaynin.",s:"Cada día es una fiesta del Sol, una floración, una renovación de la vida.",w:{q:"Musuqyay",s:"Renovarse / hacerse nuevo"}},
{sun:"\uD83D\uDCA7",g:"Yaku hina",q:"Yaku tukuyman kawsayta quwan, mana sapanpaq. Qampis kay p'unchaypi tukuyman allinta ruy.",s:"El agua da vida a todos. Tú también hoy haz el bien a todos.",w:{q:"Tukuyman",s:"A todos / para todos"}},
{sun:"\uD83C\uDF3F",g:"Allpa kallpan",q:"Allpamanta llaqsimun tukuy kawsay. Qampim allpap wawan, kallpaniyuqmi kanki.",s:"De la tierra brota toda vida. Tú eres hijo/a de la tierra, tienes fuerza.",w:{q:"Allpap wawan",s:"Hijo/a de la tierra"}},
{sun:"\uD83C\uDF05",g:"Inti k'anchaypi",q:"Inti k'anchaynin llaqsimuqtiy, llakin p'ampakun. Kusiy hamuqtin, sunqo wiñan.",s:"Cuando sale el sol, la tristeza se cubre. Cuando llega la alegría, el corazón crece.",w:{q:"P'ampakun",s:"Se cubre / se esconde solo"}},
{sun:"\uD83D\uDCAB",g:"Sumaq pacha",q:"Kay pachaqa sumaqmi kachkan qamrayku. Qamñataqmi sumaq kachkanki kay pacharayku.",s:"Este mundo es hermoso por ti. Y tú también eres hermoso/a por este mundo.",w:{q:"Qamñataq",s:"Y tú también / tú a su vez"}},
{sun:"☀️",g:"Kawsarichiy",q:"Inti sapa p'unchay kawsarichin tukuy ima kawsaq kaqta. Qampis kay p'unchaypi kawsarichiy imatapas.",s:"El sol da vida a todo ser vivo. Tú también hoy dale vida a algo.",w:{q:"Kawsarichiy",s:"Dar vida / animar"}},
{sun:"\uD83C\uDF3A",g:"Yupaychay",q:"Sulpayki Pachamama, sulpayki Inti, sulpayki yaku, sulpayki wayra. Tukuytan munakuyki.",s:"Gracias Pachamama, Sol, agua, viento. A todos los amo.",w:{q:"Tukuytan munakuyki",s:"A todos los amo"}},
{sun:"\uD83C\uDF04",g:"Munakuyma tukuy",q:"Munakuywan rikcharispa, munakuywan llamkaspa, munakuywan puñukuy.",s:"Despierta con amor, trabaja con amor, duerme con amor.",w:{q:"Munakuyma tukuy",s:"Volverse amor / transformarse en amor"}},
{sun:"\uD83C\uDFD4️",g:"Apu yachayninwan",q:"Apum yachayninwan qawamun urqup patanmanta. Sami qowan, kallpa qowan, munakuy qowan.",s:"El Apu te mira con sabiduría desde la cima. Da bendición, fuerza y amor.",w:{q:"Urqup patanmanta",s:"Desde la cima de la montaña"}},
];

function setupMorning(id){
  const days=['Domingo','Lunes','Martes','Miércoles','Jueves','Viernes','Sábado'];
  const months=['enero','febrero','marzo','abril','mayo','junio','julio','agosto','septiembre','octubre','noviembre','diciembre'];
  const now=new Date();
  const doy=Math.floor((now-new Date(now.getFullYear(),0,0))/86400000);
  const m=MSGS[doy%MSGS.length];
  const ds=days[now.getDay()]+', '+now.getDate()+' de '+months[now.getMonth()];
  const h=now.getHours();
  const al=h<12?"Allin p'unchay":h<18?"Allin ch'isi":"Allin tuta";
  const elems=`<div style="display:flex;gap:8px"><div style="flex:1;background:rgba(255,255,255,.04);border:1px solid rgba(255,255,255,.07);border-radius:11px;padding:10px 5px;text-align:center"><span style="font-size:18px;display:block;margin-bottom:3px">☀️</span><div style="font-size:11px;font-weight:700">Inti</div><div style="font-size:10px;color:var(--muted)">Sol</div></div><div style="flex:1;background:rgba(255,255,255,.04);border:1px solid rgba(255,255,255,.07);border-radius:11px;padding:10px 5px;text-align:center"><span style="font-size:18px;display:block;margin-bottom:3px">\uD83C\uDF0A</span><div style="font-size:11px;font-weight:700">Yaku</div><div style="font-size:10px;color:var(--muted)">Agua</div></div><div style="flex:1;background:rgba(255,255,255,.04);border:1px solid rgba(255,255,255,.07);border-radius:11px;padding:10px 5px;text-align:center"><span style="font-size:18px;display:block;margin-bottom:3px">\uD83C\uDF3F</span><div style="font-size:11px;font-weight:700">Sach'a</div><div style="font-size:10px;color:var(--muted)">Árbol</div></div><div style="flex:1;background:rgba(255,255,255,.04);border:1px solid rgba(255,255,255,.07);border-radius:11px;padding:10px 5px;text-align:center"><span style="font-size:18px;display:block;margin-bottom:3px">\uD83C\uDFD4️</span><div style="font-size:11px;font-weight:700">Apu</div><div style="font-size:10px;color:var(--muted)">Espíritu</div></div></div>`;
  if(id==='morning'){
    document.getElementById('mdate').textContent=ds;
    document.getElementById('mgreet').textContent=al+' · '+m.g;
    document.getElementById('msun').textContent=m.sun;

let rData=null, rIdx=0, rMode='parallel';
function openReader(key){
  const src = (key.startsWith('aymara')) ? CONT_A : CONT_Q;
  rData = src[key];
  rIdx = 0; rMode='parallel';
  document.getElementById('rtit').textContent = rData.title;
  renderP();
  showScr('reader');
}
function renderP(){
  const p = rData.pieces[rIdx];
  const n = rData.pieces.length;
  document.getElementById('rprev').disabled = rIdx===0;
  document.getElementById('rnext').disabled = rIdx===n-1;
  document.getElementById('rprog').style.cssText='width:'+(((rIdx+1)/n)*100)+'%;background:'+rData.color;
  const isAy = p.isAy;
  const qlClass = isAy ? 'ql ay' : 'ql';
  let h='<div class="ptyp" style="background:'+rData.color+'22;color:'+rData.color+'">'+p.type+'</div>';
  h+='<h2 class="ptit">'+p.title+'</h2><p class="psub">'+p.sub+'</p>';
  if(!p.essay){
    h+='<div class="togrow">';
    ['Ambos','Solo '+(isAy?'Aymara':'Quechua'),'Solo Español'].forEach((l,i)=>{
      const m=['parallel','qonly','sonly'][i];
      const active=rMode===m;
      const st=active?'background:'+rData.color+'22;color:'+rData.color+';border-color:'+rData.color:'';
      h+='<button class="togbtn'+(active?' on':'')+'" style="'+st+'" onclick="setMode(this.dataset.m)" data-m="'+m+'">'+l+'</button>';
    });
    h+='</div>';
  }
  if(p.poem){
    h+='<div class="'+rMode+' poem" style="text-align:center;padding:10px 0">';
    p.lines.forEach(l=>{ h+='<div class="'+qlClass+'" style="text-align:center">'+l.q+'</div><div class="sl">'+l.s+'</div>'; });
    h+='</div>';
  } else if(p.essay){
    p.paras.forEach(pr=>{ h+='<div class="eqp">'+pr.q+'</div><div class="esp">'+pr.s+'</div>'; });
  } else {
    h+='<div class="'+rMode+'">';
    p.lines.forEach(l=>{ h+='<div class="'+qlClass+'">'+l.q+'</div><div class="sl">'+l.s+'</div>'; });
    h+='</div>';
  }
  if(p.notes){
    h+='<div class="gbox"><div class="gtit">\uD83D\uDCD6 Gramática</div>';
    p.notes.forEach(n=>{ h+='<div class="gterm">'+n.t+'</div><div class="gdef">'+n.d+'</div>'; });
    h+='</div>';
  }
  h+='<div class="pnav"><button style="background:var(--card);border:1px solid var(--bdr);color:var(--txt);border-radius:11px;flex:1;padding:13px;font-size:14px;font-weight:700;cursor:pointer" '+(rIdx===0?'disabled onclick=""':'onclick="prevP()"')+'>← Anterior</button><button style="background:'+rData.color+';color:#000;border:none;border-radius:11px;flex:1;padding:13px;font-size:14px;font-weight:700;cursor:pointer" '+(rIdx===rData.pieces.length-1?'disabled':'onclick="nextP()"')+'>Siguiente →</button></div>';
  document.getElementById('rbody').innerHTML=h;
  document.getElementById('rbody').scrollTop=0;
}
function setMode(m){ rMode=m; renderP(); }
function prevP(){ if(rIdx>0){rIdx--;renderP();} }
function nextP(){ if(rIdx<rData.pieces.length-1){rIdx++;renderP();} }

let refKey='', refTab=0, refSearch='';
function openRef(key){
  refKey=key; refTab=0; refSearch='';
  document.getElementById('refinp').value='';
  const isQ = key==='verbos'||key==='sufijos';
  const isAyV = key==='aymara_verbos';
  const isAyS = key==='aymara_sufijos';
  document.getElementById('reftit').textContent = key==='verbos'?'Verbos Quechua':key==='sufijos'?'Sufijos Quechua':key==='aymara_verbos'?'Verbos Aymara':key==='palabras'?'Vocabulario':'Sufijos Aymara';
  const data = key==='verbos'?VERBOS_Q:key==='sufijos'?SUFIJOS_Q:key==='aymara_verbos'?VERBOS_A:key==='palabras'?PALABRAS_Q:SUFIJOS_A;
  const cats=[...new Set(data.map(x=>x.cat))];
  document.getElementById('reftabs').innerHTML=cats.map((c,i)=>'<button class="rtab'+(i===0?' on':'')+'" onclick="setRefTab('+i+')" id="rtt'+i+'">'+c+'</button>').join('');
  document.getElementById('refcnt').textContent=data.length+' items';
  renderRef();
  showScr('reference');
}
function setRefTab(i){ refTab=i; document.querySelectorAll('.rtab').forEach((t,j)=>t.className='rtab'+(j===i?' on':'')); renderRef(); }
function filterRef(){ refSearch=document.getElementById('refinp').value.toLowerCase(); renderRef(); }
let _refItems=[];
function renderRef(){
  _refItems=[];
  const data = refKey==='verbos'?VERBOS_Q:refKey==='sufijos'?SUFIJOS_Q:refKey==='aymara_verbos'?VERBOS_A:refKey==='palabras'?PALABRAS_Q:SUFIJOS_A;
  const cats=[...new Set(data.map(x=>x.cat))];
  let items = refSearch ? data.filter(x=>x.q.toLowerCase().includes(refSearch)||x.s.toLowerCase().includes(refSearch)) : data.filter(x=>x.cat===cats[refTab]);
  let h='';
  if(refSearch) {
    const byCat={};
    items.forEach(x=>{ if(!byCat[x.cat])byCat[x.cat]=[]; byCat[x.cat].push(x); });
    Object.keys(byCat).forEach(c=>{ h+='<div class="rcath">'+c+'</div>'; byCat[c].forEach(x=>h+=rItemHTML(x)); });
  } else {
    items.forEach(x=>h+=rItemHTML(x));
  }
  document.getElementById('reflist').innerHTML=h||'<div style="padding:30px;text-align:center;color:var(--muted)">Sin resultados</div>';
}
function rItemHTML(x){
  const isVerb = refKey==='verbos'||refKey==='aymara_verbos';
  const idx = _refItems.push(x) - 1;
  return '<div class="ritem" onclick="openD(' + idx + ')"><div style="flex:1"><div class="riq">' + x.q + '</div><div class="ris">' + x.s + '</div></div>' + (isVerb ? '<div class="rtag" style="background:' + x.col + '22;color:' + x.col + '">' + x.cat + '</div>' : '') + '</div>';
}
function openD(idx){
  const x=_refItems[idx];
  const isVerb=refKey==='verbos'||refKey==='aymara_verbos';
  const isAy=refKey==='aymara_verbos'||refKey==='aymara_sufijos';
  document.getElementById('dhdr').innerHTML='<div class="dword" style="color:'+(isVerb?x.col:'var(--violet)')+'">'+x.q+'</div><div class="dmean">'+x.s+'</div>'+(x.uso?'<div style="font-size:13px;color:var(--muted);margin-top:4px">'+x.uso+'</div>':'');
  let b='';
  if(isVerb&&x.c){
    const lbls = isAy
      ? [['Naya (yo)',x.c.yo],['Juma (tú)',x.c.tu],['Jupa (él/ella)',x.c.el],['Nanaka (nos.excl)',x.c.nos],['Jiwasa (nos.incl)',x.c.nex],['Jumana (uds)',x.c.uds],['Jupanaka (ellos)',x.c.ell]]
      : [['Ñuqam (yo)',x.c.yo],['Qam (tú)',x.c.tu],['Pay (él/ella)',x.c.el],['Ñuqanchik (nos.incl)',x.c.nos],['Ñuqayku (nos.excl)',x.c.nex],['Qamkuna (uds)',x.c.uds],['Paykuna (ellos)',x.c.ell]];
    b+='<div class="dsect"><div class="dstit">Conjugación</div><table class="ctable">';
    lbls.forEach(([l,v])=>{ b+='<tr><td>'+l+'</td><td>'+(v||'—')+'</td></tr>'; });
    b+='</table></div>';
  }
  if(x.ex&&x.ex.length){
    b+='<div class="dsect"><div class="dstit">Ejemplos</div>';
    x.ex.forEach(e=>{ b+='<div class="exbox"><div class="exq">'+e.q+'</div><div class="exs">'+e.s+'</div></div>'; });
    b+='</div>';
  }
  if(x.note){ b+='<div class="dsect"><div class="dstit">Nota</div><div class="notebox">'+x.note+'</div></div>'; }
  document.getElementById('dbody').innerHTML=b;
  document.getElementById('dpanel').classList.add('on');
}
function closeD(){ document.getElementById('dpanel').classList.remove('on'); }

let deck=[],cIdx=0,cFlipped=false,cLang='q',cCats=[],activeCats=[];
let touchStartX=0,touchStartY=0,isDragging=false;

function openCards(lang){
  cLang=lang; cFlipped=false;
  const data = lang==='q' ? VERBOS_Q : VERBOS_A;
  const cats=[...new Set(data.map(x=>x.cat))];
  activeCats=[...cats];
  const saved=JSON.parse(localStorage.getItem('yachay_v5_'+lang)||'{}');
  deck=data.filter(x=>!saved[x.q]);
  shuffle(deck); cIdx=0;
  setupCardFilters(lang);
  renderCard();
  showScr('cards');
}
function setupCardFilters(lang){
  const data=lang==='q'?VERBOS_Q:VERBOS_A;
  const cats=[...new Set(data.map(x=>x.cat))];
  cCats=cats;
  document.getElementById('ftags').innerHTML=cats.map(c=>'<button class="ftag on" id="ft_'+c.replace(/\s/g,'_')+'" onclick="toggleCat(\''+c+'\')">'+c+'</button>').join('');
}
function toggleCat(c){
  const i=activeCats.indexOf(c);
  if(i>=0) activeCats.splice(i,1); else activeCats.push(c);
  document.getElementById('ft_'+c.replace(/\s/g,'_')).className='ftag'+(activeCats.includes(c)?' on':'');
}
function openFilter(){ document.getElementById('fpanel').classList.add('on'); }
function closeFP(e){ if(e.target===document.getElementById('fpanel')) document.getElementById('fpanel').classList.remove('on'); }
function applyF(){
  document.getElementById('fpanel').classList.remove('on');
  const data=cLang==='q'?VERBOS_Q:cLang==='p'?PALABRAS_Q:VERBOS_A;
  const saved=JSON.parse(localStorage.getItem('yachay_v5_'+cLang)||'{}');
  deck=data.filter(x=>activeCats.includes(x.cat)&&!saved[x.q]);
  shuffle(deck); cIdx=0; cFlipped=false;
  renderCard();
}
function shuffle(a){ for(let i=a.length-1;i>0;i--){ const j=Math.floor(Math.random()*(i+1));[a[i],a[j]]=[a[j],a[i]]; } }
function renderCard(){
  const total=cLang==='q'?VERBOS_Q.length:cLang==='p'?PALABRAS_Q.length:VERBOS_A.length;
  const saved=Object.keys(JSON.parse(localStorage.getItem('yachay_v5_'+cLang)||'{}')).length;
  document.getElementById('cprog').style.width=(saved/total*100)+'%';
  document.getElementById('ccnt').textContent=deck.length+' restantes';
  if(deck.length===0||cIdx>=deck.length){ showEmpty(); return; }
  const v=deck[cIdx];
  const fc=document.getElementById('fc');
  fc.className='fc'; cFlipped=false;
  document.getElementById('cwrap').style.display='';
  document.getElementById('cemp').classList.remove('on');
  document.getElementById('cacts').style.display='flex';
  const isAy=cLang==='a';
  document.getElementById('cff').innerHTML=
    '<div class="ccatpos"><div class="ccpill" style="background:'+v.col+'22;color:'+v.col+'">'+v.cat+'</div></div>'+
    '<div class="cvb">'+v.q+'</div>'+
    '<div class="cme">'+v.s+'</div>'+
    '<div class="ctap">Toca para ver conjugación</div>';
  const pronLabels=isAy
    ?['Naya','Juma','Jupa','Nanaka','Jiwasa','Jumana','Jupanaka']
    :['Ñuqam','Qam','Pay','Ñuqanchik','Ñuqayku','Qamkuna','Paykuna'];
  const pronKeys=['yo','tu','el','nos','nex','uds','ellos'];
  const tenses=[
    {id:'pres',lbl:'Presente',data:v.c||{}},
    {id:'past',lbl:'Pasado',data:v.p||v.c||{}},
    {id:'fut',lbl:'Futuro',data:v.f||v.c||{}}
  ];
  function buildGrid(tdata){
    let g='<div class="cgrid">';
    pronLabels.forEach(function(lbl,i){
      const key=pronKeys[i];
      g+='<div class="ccell"><div class="cclbl">'+lbl+'</div><div class="ccword" style="color:'+v.col+'">'+(tdata[key]||'—')+'</div></div>';
    });
    g+='</div>';
    return g;
  }
  window._buildBack=function(tId){
    const t=tenses.find(function(x){return x.id===tId;})||tenses[0];
    let back='<div class="cbv">'+v.q+'</div><div class="cbm">'+v.s+'</div>';
    back+='<div class="ctabs">';
    tenses.forEach(function(x){
      const onCls=(x.id===tId?' on':'');
      back+='<button class="ctbtn'+onCls+'" data-tid="'+x.id+'">'+x.lbl+'</button>';
    });
    back+='</div>';
    back+=buildGrid(t.data);
    const ejsSrc=v.ejs||null;
    if(ejsSrc&&ejsSrc.length){
      back+='<div class="cexlbl">Oraciones de uso</div>';
      ejsSrc.forEach(function(e){
        back+='<div class="cexi"><div class="cexiq">'+(e.q||'')+'</div><div class="cexis">'+(e.s||'')+'</div>';
        if(e.suf) back+='<div class="cexsuf">📌 '+(e.suf)+'</div>';
        back+='</div>';
      });
    }
    if(v.note) back+='<div class="cnote">💡 '+v.note+'</div>';
    return back;
  };
  window.switchTense=function(tId){
    const cbf=document.getElementById('cbf');
    cbf.innerHTML=window._buildBack(tId);
    cbf.querySelectorAll('.ctbtn').forEach(function(b){
      b.addEventListener('click',function(e){ e.stopPropagation(); switchTense(b.dataset.tid); });
    });
  };
  const cbf=document.getElementById('cbf');
  cbf.innerHTML=window._buildBack('pres');
  cbf.querySelectorAll('.ctbtn').forEach(function(b){
    b.addEventListener('click',function(e){ e.stopPropagation(); switchTense(b.dataset.tid); });
  });
  setupSwipe();
}
function showEmpty(){
  document.getElementById('cwrap').style.display='none';
  document.getElementById('cemp').classList.add('on');
  document.getElementById('cacts').style.display='none';
}
function flipC(){
  const fc=document.getElementById('fc');
  cFlipped=!cFlipped;
  fc.className='fc'+(cFlipped?' flip':'');
}
function learnC(){
  if(cIdx>=deck.length)return;
  const v=deck[cIdx];
  const saved=JSON.parse(localStorage.getItem('yachay_v5_'+cLang)||'{}');
  saved[v.q]=1;
  localStorage.setItem('yachay_v5_'+cLang,JSON.stringify(saved));
  showToast(' ¡Aprendido!','var(--green)');
  deck.splice(cIdx,1);
  if(cIdx>=deck.length)cIdx=Math.max(0,deck.length-1);
  cFlipped=false;
  renderCard();
}
function skipC(){
  if(cIdx>=deck.length)return;
  const v=deck.splice(cIdx,1)[0];
  deck.push(v);
  if(cIdx>=deck.length)cIdx=0;
  cFlipped=false;
  renderCard();
}
function resetDeck(){
  localStorage.removeItem('yachay_v5_'+cLang);
  openCards(cLang);
}
function showToast(msg,col){
  const t=document.getElementById('toast');
  t.textContent=msg; t.style.background=col||'var(--card)'; t.style.color='#fff';
  t.classList.add('on');
  setTimeout(()=>t.classList.remove('on'),1800);
}
function setupSwipe(){
  const fc=document.getElementById('fc');
  fc.addEventListener('touchstart',e=>{ touchStartX=e.touches[0].clientX; touchStartY=e.touches[0].clientY; isDragging=false; },{passive:true});
  fc.addEventListener('touchmove',e=>{
    const dx=e.touches[0].clientX-touchStartX, dy=e.touches[0].clientY-touchStartY;
    if(Math.abs(dx)>Math.abs(dy)&&Math.abs(dx)>10){ isDragging=true; fc.style.transform='translateX('+dx+'px) rotate('+(dx*0.05)+'deg)'; document.getElementById('swr').style.opacity=dx>40?'1':'0'; document.getElementById('swl').style.opacity=dx<-40?'1':'0'; }
  },{passive:true});
  fc.addEventListener('touchend',e=>{
    const dx=e.changedTouches[0].clientX-touchStartX;
    fc.style.transform=''; document.getElementById('swr').style.opacity=0; document.getElementById('swl').style.opacity=0;
    if(isDragging){ if(dx>80)learnC(); else if(dx<-80)skipC(); isDragging=false; } else flipC();
  });
}

// ============================================================
// QUIZ
// ============================================================
let qData=[],qIdx=0,qScore=0,qAnswered=false,qLang='q';
function startQuiz(lang){
  qLang=lang;
  document.getElementById('quiztit').textContent = lang==='q'?'\uD83C\uDFAF Quiz Quechua':'\uD83C\uDFAF Quiz Aymara';
  qData=shuffle2(lang==='q'?[...QUIZ_Q]:[...QUIZ_A]);
  qIdx=0; qScore=0; qAnswered=false;
  document.getElementById('lscore').textContent=' 0';
  renderQ();
  showScr('quiz');
}
function shuffle2(a){ for(let i=a.length-1;i>0;i--){ const j=Math.floor(Math.random()*(i+1));[a[i],a[j]]=[a[j],a[i]]; } return a; }
function renderQ(){
  const n=qData.length;
  document.getElementById('qcnt').textContent=(qIdx+1)+'/'+n;
  document.getElementById('qprog').style.width=((qIdx/n)*100)+'%';
  if(qIdx>=n){ showResult(); return; }
  const q=qData[qIdx]; qAnswered=false;
  let h='<div class="qcard"><div class="qprompt">Traduce al español</div><div class="qsent">'+q.q+'</div><div class="qopts">';
  q.opts.forEach((o,i)=>h+='<button class="qopt" id="qo'+i+'" onclick="ansQ('+i+')">'+o+'</button>');
  h+='</div><div id="qexp"></div></div><button class="bmain" style="background:var(--gold);color:#000" id="qnext" disabled onclick="nextQ()">SIGUIENTE →</button>';
  document.getElementById('qbody').innerHTML=h;
}
function ansQ(i){
  if(qAnswered)return; qAnswered=true;
  const q=qData[qIdx,
  {q:"Nayaxa sarnaqta.",a:"Yo camino.",h:"Naya = yo; sarnaqta = camino (yo)"},
  {q:"Jupasti manq'i.",a:"Él/ella come.",h:"Jupa = él/ella; manq'i = come"},
  {q:"Kawkitsa jutata?",a:"¿De dónde vienes?",h:"kawkiti = ¿de dónde?; jutata = vienes"},
  {q:"Aymara arsuña muntha.",a:"Quiero hablar aymara.",h:"muntha = quiero; arsuña = hablar"},
  {q:"Jallu utt'ayatayna.",a:"Estaba lloviendo.",h:"jallu = lluvia; utt'ayatayna = estaba cayendo"}
];
  document.querySelectorAll('.qopt').forEach((o,j)=>{
    o.classList.add(j===q.a?'ok':(j===i&&i!==q.a?'bad':'dim'));
  });
  if(i===q.a){ qScore++; document.getElementById('lscore').textContent=' '+qScore; }
  document.getElementById('qexp').innerHTML='<div class="qexp">'+q.ex+'</div>';
  document.getElementById('qnext').disabled=false;
}
function nextQ(){ qIdx++; renderQ(); }
function showResult(){
  const pct=Math.round(qScore/qData.length*100);
  const e=pct>=80?'\uD83C\uDFC6':pct>=50?'\uD83C\uDFAF':'\uD83D\uDCDA';
  const m=pct>=80?'¡Excelente!':pct>=50?'Buen trabajo':'Sigue practicando';
  const s=pct>=80?'¡Dominaste el quiz!':pct>=50?'Vas por buen camino.':'La práctica hace al maestro.';
  document.getElementById('re').textContent=e;
  document.getElementById('rm').textContent=m;
  document.getElementById('rsb').textContent=s;
  document.getElementById('rsc').textContent=qScore+'/'+qData.length;
  document.getElementById('rpct').textContent=pct+'%';
  const wrong=qData.filter((_,i)=>{}).slice();
  document.getElementById('rrev').innerHTML='';
  document.getElementById('rrepeat').onclick=()=>startQuiz(qLang);
  showScr('result');
}

// ============================================================
// CHAT
// ============================================================
let chatHistory=[], chatLang='q';
const CHAT_SYS={
  q:`Eres un tutor experto de Quechua (variante Cusco-Collao). Ayudas a aprender Quechua respondiendo SIEMPRE en español (a menos que el usuario escriba en Quechua). Cuando des ejemplos, usa formato: Quechua → español. Si corriges, explica la regla gramatical. Sé amable, claro y conciso. Máximo 3-4 oraciones por respuesta.`,
  a:`Eres un tutor experto de Aymara (variante boliviano-peruano). Ayudas a aprender Aymara respondiendo SIEMPRE en español (a menos que el usuario escriba en Aymara). Cuando des ejemplos, usa formato: Aymara → español. Si corriges, explica la regla gramatical. Sé amable, claro y conciso. Máximo 3-4 oraciones por respuesta.`
};
const SUGS={
  q:['¿Cómo se conjuga Munay?','¿Qué es el evidencial -mi?','Corrige mi oración','¿Cómo digo "te amo"?'],
  a:['¿Cómo saludar en Aymara?','¿Qué es el sufijo -wa?','¿Cómo se conjuga Yatiña?','¿Diferencia Quechua/Aymara?']
};
function openChat(lang){
  chatLang=lang; chatHistory=[];
  document.getElementById('chattit').textContent=lang==='q'?'\uD83E\uDD16 Tutor IA — Quechua':'\uD83E\uDD16 Tutor IA — Aymara';
  document.getElementById('cmsgs').innerHTML='';
  document.getElementById('csugs').innerHTML=SUGS[lang].map(s=>'<button class="chip" onclick="sendChip(\''+s+'\')">'+s+'</button>').join('');
  addMsg('a','Hola! Soy tu tutor de '+(lang==='q'?'Quechua':'Aymara')+'. ¿Qué quieres aprender hoy?');
  showScr('chat');
}
function addMsg(role,text){
  const d=document.getElementById('cmsgs');
  const div=document.createElement('div');
  div.className='msg '+role;
  div.innerHTML='<div class="bbl">'+text.replace(/\n/g,'<br>')+'</div>';
  d.appendChild(div); d.scrollTop=d.scrollHeight;
}
function sendChip(t){ document.getElementById('cinp').value=t; sendMsg(); }
function autoR(el){ el.style.height='auto'; el.style.height=Math.min(el.scrollHeight,120)+'px'; }
function chatKey(e){ if(e.key==='Enter'&&!e.shiftKey){e.preventDefault();sendMsg();} }
async function sendMsg(){
  const inp=document.getElementById('cinp');
  const txt=inp.value.trim(); if(!txt)return;
  inp.value=''; inp.style.height='auto';
  document.getElementById('sbtn').disabled=true;
  addMsg('u',txt);
  chatHistory.push({role:'user',content:txt});
  // typing
  const d=document.getElementById('cmsgs');
  const td=document.createElement('div'); td.className='msg a'; td.id='typing';
  td.innerHTML='<div class="bbl"><span class="tdot"></span><span class="tdot"></span><span class="tdot"></span></div>';
  d.appendChild(td); d.scrollTop=d.scrollHeight;
  try{
    const r=await fetch('https://api.anthropic.com/v1/messages',{
      method:'POST',
      headers:{'Content-Type':'application/json','x-api-key':'','anthropic-version':'2023-06-01','anthropic-dangerous-direct-browser-access':'true'},
      body:JSON.stringify({model:'claude-sonnet-4-20250514',max_tokens:500,system:CHAT_SYS[chatLang],messages:chatHistory})
    });
    const data=await r.json();
    const reply=data.content?.[0]?.text||'Error de conexión.';
    chatHistory.push({role:'assistant',content:reply});
    document.getElementById('typing')?.remove();
    addMsg('a',reply);
  }catch(e){
    document.getElementById('typing')?.remove();
    addMsg('a','Error de conexión. Verifica tu red.');
  }
  document.getElementById('sbtn').disabled=false;
}

window.addEventListener('load',()=>{
  document.getElementById('morning').classList.add('on');
});
